<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>빽다방 RECIPE</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-label="레시피 검색">
        <div class="hero__top">
          <div>
            <p class="eyebrow">My cafe notes</p>
            <h1>빽다방 RECIPE</h1>
          </div>
          <button class="icon-button" id="openFormButton" type="button" aria-label="레시피 추가">
            +
          </button>
        </div>

        <div class="search-card">
          <label class="search-box" for="searchInput">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="메뉴명, 재료, 메모 검색" autocomplete="off" />
          </label>
          <div class="category-tabs" id="categoryTabs" aria-label="카테고리 필터"></div>
        </div>
      </section>

      <section class="quick-panel" aria-label="레시피 현황">
        <div>
          <span id="recipeCount">0</span>
          <p>저장된 레시피</p>
        </div>
        <div>
          <span id="favoriteCount">0</span>
          <p>즐겨찾기</p>
        </div>
      </section>

      <section class="recipe-list" id="recipeList" aria-live="polite"></section>
    </main>

    <dialog class="recipe-dialog" id="recipeDialog">
      <form class="recipe-form" id="recipeForm" method="dialog">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Recipe editor</p>
            <h2 id="dialogTitle">레시피 추가</h2>
          </div>
          <button class="ghost-button" id="closeFormButton" type="button">닫기</button>
        </div>

        <input id="recipeId" type="hidden" />

        <label>
          메뉴명
          <input id="nameInput" type="text" placeholder="예: 아이스 카페라떼" required />
        </label>

        <div class="form-grid">
          <label>
            카테고리
            <select id="categoryInput">
              <option>커피</option>
              <option>스무디</option>
              <option>에이드</option>
              <option>티</option>
              <option>디저트</option>
              <option>기타</option>
            </select>
          </label>
          <label>
            난이도
            <select id="levelInput">
              <option>쉬움</option>
              <option>보통</option>
              <option>어려움</option>
            </select>
          </label>
        </div>

        <label>
          재료
          <textarea id="ingredientsInput" placeholder="재료를 줄바꿈으로 입력하세요" required></textarea>
        </label>

        <label>
          제조 순서
          <textarea id="stepsInput" placeholder="순서를 줄바꿈으로 입력하세요" required></textarea>
        </label>

        <label>
          메모
          <textarea id="memoInput" placeholder="얼음량, 컵 사이즈, 개인 팁 등"></textarea>
        </label>

        <label class="check-row">
          <input id="favoriteInput" type="checkbox" />
          <span>즐겨찾기에 추가</span>
        </label>

        <div class="form-actions">
          <button class="danger-button" id="deleteButton" type="button">삭제</button>
          <button class="primary-button" type="submit">저장</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
